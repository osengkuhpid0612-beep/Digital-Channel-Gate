name: Daily Data Fetch & Isolated Validation

on:
  schedule:
    - cron: '0 0 * * *'  # 每天午夜執行
  workflow_dispatch:     # 允許手動觸發

jobs:
  fetch_and_validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: Run fetcher
        run: python scripts/fetcher.py
      
      - name: Run isolated validator (隔離沙盒模式)
        run: |
          # 驗證新聞資料
          python scripts/isolated_validator.py data/raw/news_*.json data/filtered/news_validated.json || true
          # 驗證科技資料
          python scripts/isolated_validator.py data/raw/tech_*.json data/filtered/tech_validated.json || true
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Daily validation - $(date +'%Y-%m-%d %H:%M:%S') - 隔離沙盒模式" || true
          git push
